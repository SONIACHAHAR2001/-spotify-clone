<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="Assets\logo.png" type="image/png">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
  <!-- HOME ICON -->
        <div class="home-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
            <path d="M12 3L3 10V21H9V14H15V21H21V10L12 3Z"/>
            </svg>
        </div>

  <!-- SEARCH BAR -->
        <div class="search-container">
    
    <!-- SEARCH ICON -->
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="11" cy="11" r="7" stroke="#b3b3b3" stroke-width="2"/>
                <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="#b3b3b3" stroke-width="2"/>
            </svg>

    <!-- INPUT -->
            <input type="text" placeholder="What do you want to play?" />

    <!-- DIVIDER -->
            <div class="divider"></div>

    <!-- BROWSE ICON -->
            <svg class="browse-icon" width="20" height="20" viewBox="0 0 24 24">
                <path d="M3 7H21" stroke="#b3b3b3" stroke-width="2" stroke-linecap="round"/>
                <path d="M6 7V5C6 4.44772 6.44772 4 7 4H17C17.5523 4 18 4.44772 18 5V7" stroke="#b3b3b3" stroke-width="2"/>
                <rect x="4" y="7" width="16" height="13" rx="2" stroke="#b3b3b3" stroke-width="2"/>
                <circle cx="12" cy="13" r="1.5" fill="#b3b3b3"/>
            </svg>

        </div>
    </header>
   


    <div class="main">
        <div class="sidebar">
            <div class="lib">

                <div class="options">
                    <div class="lib-option nav-option">
                    <a href="#">Your Library</a>
                    </div>

                    <div class="icons">
                        <i class="fa-solid fa-plus"></i>
                    </div>
                </div>


                <div class="lib-box">
                    <div class="box">
                        <p class="box-p1">Create your first playlist</p>
                        <p class="box-p2">It's easy, we'll help you</p>
                        <button class="badge">Create playlist</button>
                    </div>

                    <div class="box">
                        <p class="box-p1">Let's find some podcast to follow</p>
                        <p class="box-p2">we'll keep you updated on new episodes</p>
                        <button class="badge">Browse podcasts</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">main content</div>
        <div class="music-player">music player</div>

        
    
    </div>
    
</body>
</html>
